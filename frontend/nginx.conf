server {
  listen 80;

  # This is the root directory for our static files
  root /usr/share/nginx/html;
  index index.html;

  location / {
    # First, try to serve the requested file directly.
    # If it doesn't exist, fall back to serving index.html.
    # This is the standard configuration for a Single Page Application (SPA).
    try_files $uri /index.html;
  }
} 