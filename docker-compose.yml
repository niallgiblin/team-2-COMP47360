services:
  db:
    image: mysql:8.0
    container_name: urban-gala-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: urban_gala
      MYSQL_USER: urbanuser
      MYSQL_PASSWORD: urbanpass
    # Set default authentication plugin for compatibility with older clients
    command:
      - --local-infile=1
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "$${MYSQL_USER}", "-p$${MYSQL_PASSWORD}"]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 40s
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/docker/db-init:/docker-entrypoint-initdb.d:ro
      - ./backend/docker/db-config/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    networks:
      - app-network

  backend:
    build:
      context: ./backend
    container_name: urban-gala-backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      llm-service:
        condition: service_healthy
      busyness-service:
        condition: service_healthy
    environment:
      BUSYNESS_SERVICE_URL: http://busyness-service:5000
      LLM_SERVICE_URL: http://llm-service:5000
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
    container_name: urban-gala-frontend
    ports:
      - "5173:5173"
      - "24678:24678"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    environment:
      - HOST=0.0.0.0
    depends_on:
      - backend
    networks:
      - app-network

  llm-service:
    build:
      context: ./backend/llm-service
    container_name: urban-gala-llm
    ports:
      - "5001:5000"
    # Mount only the data directory, models are now copied into the image
    volumes:
      - ./backend/llm-service/data:/app/data:ro
    environment:
      - FLASK_ENV=production
      - MODEL_PATH=/app/models/sentence-transformers
      - EMBEDDINGS_PATH=/app/data/location_embeddings.npy
      - DATA_PATH=/app/data/locations.csv
      - PYTHONUNBUFFERED=1
    networks:
      - app-network
    # Increase worker timeout to prevent crashes during intensive ML operations
    command: gunicorn --bind 0.0.0.0:5000 --timeout 120 "app:app"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s  # Give more time for model loading
    deploy:
      resources:
        limits:
          memory: 2G  # Increased memory for sentence transformers
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.25'
    restart: unless-stopped

  busyness-service:
    build:
      context: ./backend/busyness-service
    container_name: urban-gala-busyness
    ports:
      - "5002:5000"
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    networks:
      - app-network
    healthcheck:
      # Tighter healthcheck to get faster feedback on the crash-loop.
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 15s # Give 15s to start. If it fails after this, we know it's crashing.
    deploy:
      resources:
        limits:
          memory: 8G  # Final memory increase to handle TensorFlow's peak usage
          cpus: '2.0'
        reservations:
          memory: 8G  # Guarantee the full memory amount to prevent swapping
          cpus: '0.5'
    restart: unless-stopped

networks:
  app-network:

volumes:
  db_data: