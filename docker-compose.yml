services:
  db:
    image: mysql:8.0
    container_name: urban-gala-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: urban_gala
      MYSQL_USER: urbanuser
      MYSQL_PASSWORD: urbanpass
    healthcheck: # More robust health check to ensure the DB is ready for app connections
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "$${MYSQL_USER}", "-p$${MYSQL_PASSWORD}"]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 40s
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/docker/db-init:/docker-entrypoint-initdb.d:ro      # For initialization scripts (.sql, .sh)
      - ./backend/docker/db-config/my.cnf:/etc/mysql/conf.d/my.cnf:ro # For custom MySQL configuration
    networks:
      - app-network


  backend:
    build:
      context: ./backend
    container_name: urban-gala-backend
    ports:
      - "8080:8080"
    depends_on: # The backend now depends on both the DB and the ML service
      db:
        condition: service_healthy
      llm-service:
        condition: service_healthy
      busyness-service:
        condition: service_healthy
    environment:
      BUSYNESS_SERVICE_URL: http://busyness-service:5000
      LLM_SERVICE_URL: http://llm-service:5000
    networks:
      - app-network
    # Add health check and retry mechanism
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
    container_name: urban-gala-frontend
    ports:
      - "5173:5173"
      - "24678:24678"        # Vite HMR (Hot Module Replacement) websocket
    volumes:
      - ./frontend:/app      # Mount code into the container
      - /app/node_modules    # Avoid conflict with local node_modules
    command: npm run dev     # Start dev server instead of production build
    environment:
    - HOST=0.0.0.0
    depends_on:
      - backend
    networks:
      - app-network

  llm-service:
    build:
      context: ./backend/llm-service
    container_name: urban-gala-llm
    ports:
      - "5001:5000"
    volumes:
      - ./backend/llm-service/data:/app/data:ro
      - ./backend/llm-service/models/sentence-transformer:/app/models/sentence-transformer:ro
    environment:
      - FLASK_ENV=production
      - MODEL_PATH=/app/models/sentence-transformer
      - EMBEDDINGS_PATH=/app/data/location_embeddings.npy
      - DATA_PATH=/app/data/locations.csv
      - PYTHONUNBUFFERED=1
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s # Startup should be much faster now
    deploy:
      resources:
        limits:
          memory: 1.5G # Reduced memory limit
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.25'
    restart: unless-stopped

  busyness-service:
    build:
      context: ./backend/busyness-service # New build context
    container_name: urban-gala-busyness
    ports:
      - "5002:5000"
    volumes:
      - ./backend/busyness-service/models/DNNs:/app/models/busyness/dnn:ro
      - ./backend/busyness-service/models/LSTMs:/app/models/busyness/lstm:ro
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 180s # This service needs time to load models
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 768M
          cpus: '0.5'
    restart: unless-stopped

networks:
  app-network:

volumes:
  db_data: