services:
  db:
    image: mysql:8.0
    container_name: urban-gala-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: urban_gala
      MYSQL_USER: urbanuser
      MYSQL_PASSWORD: urbanpass
      MYSQL_LOCAL_INFILE: '1'
    healthcheck: # More robust health check to ensure the DB is ready for app connections
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "$${MYSQL_USER}", "-p$${MYSQL_PASSWORD}"]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 40s
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/docker/db-init:/docker-entrypoint-initdb.d
    networks:
      - app-network
    # Light MySQL optimizations - only the essential ones
    command: --secure-file-priv= --local-infile=1


  backend:
    build:
      context: ./backend
      args:
        BUILDKIT_INLINE_CACHE: 1
    container_name: urban-gala-backend
    ports:
      - "8080:8080"
    depends_on: # The backend now depends on both the DB and the ML service
      db:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/urban_gala?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: urbanuser
      SPRING_DATASOURCE_PASSWORD: urbanpass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      # Add retry parameters
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: 60000
      ML_SERVICE_URL: http://ml-service:5000 # Explicitly set ML service URL
    networks:
      - app-network
    # Add health check and retry mechanism
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
    container_name: urban-gala-frontend
    ports:
      - "5173:5173"
      - "24678:24678"        # Vite HMR (Hot Module Replacement) websocket
    volumes:
      - ./frontend:/app      # Mount code into the container
      - /app/node_modules    # Avoid conflict with local node_modules
    command: npm run dev     # Start dev server instead of production build
    environment:
    - HOST=0.0.0.0
    -  VITE_GOOGLE_API_KEY=${VITE_GOOGLE_API_KEY}
    depends_on:
      - backend
    networks:
      - app-network

  ml-service:
    build:
      context: ./backend/ml-service
      dockerfile: Dockerfile
    container_name: urban-gala-ml
    ports:
      - "5001:5000"
    volumes:
      # Mount data and models as read-only to prevent accidental modification
      - ./backend/ml-service/data:/app/data:ro
      - ./backend/ml-service/models:/app/models:ro
    environment:
      - FLASK_ENV=production
      - MODEL_PATH=/app/models/sentence-transformer
      - EMBEDDINGS_PATH=/app/data/location_embeddings.npy
      - DATA_PATH=/app/data/locations.csv
      - PYTHONUNBUFFERED=1
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 180s  # Give plenty of time for model loading
    # Resource limits to prevent OOM
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '0.5'
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
    driver_opts:
      com.docker.network.enable_ipv6: "false"
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  db_data:
