services:
  db:
    image: mysql:8.0  # Use official image instead of building
    container_name: urban-gala-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}  # Default value if env var not set
      MYSQL_DATABASE: ${MYSQL_DATABASE:-urban_gala}
      MYSQL_USER: ${MYSQL_USER:-urbanuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-urbanpass}
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/docker/db-init:/docker-entrypoint-initdb.d
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 10s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: urban-gala-backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE:-urban_gala}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-urbanuser}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-urbanpass}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
    container_name: urban-gala-frontend
    ports:
      - "5173:5173"
      - "24678:24678"        # Vite HMR (Hot Module Replacement) websocket
    volumes:
      - ./frontend:/app      # Mount code into the container
      - /app/node_modules    # Avoid conflict with local node_modules
    command: npm run dev     # Start dev server instead of production build
    environment:
    - HOST=0.0.0.0
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:

volumes:
  db_data: