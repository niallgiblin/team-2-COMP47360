services:
  backend:
    build:
      context: ./backend
    container_name: urban-gala-backend
    ports:
      - "8080:8080"
  # depends_on:
      # Uncomment this when MySQL is ready
      # - db
    networks:
      - app-network
    environment:
      # Example - customize later
      # SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/your_db
      # SPRING_DATASOURCE_USERNAME: your_user
      # SPRING_DATASOURCE_PASSWORD: your_password
      JAVA_OPTS: "-Xmx512m"

  frontend:
    build:
      context: ./frontend
    container_name: urban-gala-frontend
    ports:
      - "4173:4173"
    depends_on:
      - backend
    networks:
      - app-network

