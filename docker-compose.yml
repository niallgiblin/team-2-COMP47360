services:
  backend:
    build:
      context: ./BackEnd
      args:
        BUILDKIT_INLINE_CACHE: 1
    container_name: urban-gala-backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      llm-service:
        condition: service_healthy
      busyness-service:
        condition: service_healthy
    environment:
      BUSYNESS_SERVICE_URL: http://busyness-service:5000
      LLM_SERVICE_URL: http://llm-service:5000
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE:-urban_gala}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-urbanuser}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      APP_AVATARS_DIR: /app/avatars
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    volumes:
      - ./BackEnd/avatars:/app/avatars

  db:
    image: mysql:8
    container_name: urban-gala-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-urban_gala}
      MYSQL_USER: ${MYSQL_USER:-urbanuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    # Set local-infile for data loading
    command:
      - --local-infile=1
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "$${MYSQL_USER}", "-p$${MYSQL_PASSWORD}"]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 40s
    volumes:
      - db_data:/var/lib/mysql
      - ./BackEnd/docker/db-config/${MYSQL_CONFIG_FILE:-my.cnf}:/etc/mysql/conf.d/my.cnf:ro
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: urban-gala-frontend
    ports:
      - "5173:5173"
      - "24678:24678"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules
    command: npm run dev
    environment:
      - HOST=0.0.0.0
      - VITE_GOOGLE_API_KEY=${VITE_GOOGLE_API_KEY}
      - VITE_API_BASE_URL=/api
      - VITE_LLM_API_URL=/api/chat
    depends_on:
      - backend
    networks:
      - app-network

  frontend-prod:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
        VITE_LLM_API_URL: /api/chat
        VITE_GOOGLE_API_KEY: ${VITE_GOOGLE_API_KEY}
    container_name: urban-gala-frontend-prod
    profiles: ["prod"]
    ports:
      - "80:80"
    depends_on:
      - backend
      - llm-service
    networks:
      - app-network

  llm-service:
    build:
      context: ./BackEnd/llm-service
    container_name: urban-gala-llm
    expose:
      - "5000"
    # Corpus catalog (read-only) and precomputed embeddings under data/
    volumes:
      - ./BackEnd/llm-service/corpus:/app/corpus:ro
      - ./BackEnd/llm-service/data:/app/data:ro
    environment:
      - FLASK_ENV=production
      - MODEL_PATH=/app/models/sentence-transformers
      - EMBEDDINGS_PATH=/app/data/location_embeddings.npy
      - HF_TOKEN=${HF_TOKEN}
      - APP_JWT_SECRET=${APP_JWT_SECRET}
      - FLASK_CORS_ALLOWED_ORIGINS=${FLASK_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      - CORPUS_VERSION=v1
      - DATA_PATH=/app/corpus/v1/venues.csv
      - MANIFEST_PATH=/app/corpus/v1/manifest.json
      - PYTHONUNBUFFERED=1
    networks:
      - app-network
    # Gunicorn command matches BackEnd/llm-service/Dockerfile CMD exactly
    command: gunicorn --bind 0.0.0.0:5000 --workers 2 --preload --timeout 120 app:app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s  # Give more time for model loading
    deploy:
      resources:
        limits:
          memory: 3G  # Increased from 2G for sentence transformers
          cpus: '1.5'  # Increased from 1.0 for better processing
        reservations:
          memory: 2G  # Guaranteed memory for model loading
          cpus: '0.5'  # Guaranteed CPU for responsiveness
    restart: unless-stopped

  busyness-service:
    build:
      context: ./BackEnd/busyness-service
    container_name: urban-gala-busyness
    expose:
      - "5000"
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
      - MODEL_PATH=/app/models/DNNs
      - LSTM_MODEL_PATH=/app/models/LSTMs/Fin.keras
      - MODEL_CHECKSUMS_PATH=/app/models/checksums.sha256
      - BUSYNESS_LIVE_CACHE_TTL_SECONDS=${BUSYNESS_LIVE_CACHE_TTL_SECONDS:-1800}
      - BUSYNESS_FORECAST_CACHE_TTL_SECONDS=${BUSYNESS_FORECAST_CACHE_TTL_SECONDS:-1800}
      - BUSYNESS_CACHE_MAX_ENTRIES=${BUSYNESS_CACHE_MAX_ENTRIES:-512}
      - FLASK_CORS_ALLOWED_ORIGINS=${FLASK_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
    networks:
      - app-network
    healthcheck:
      # Tighter healthcheck to get faster feedback on the crash-loop.
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 15s # Give 15s to start. If it fails after this, we know it's crashing.
    deploy:
      resources:
        limits:
          memory: 3G  # Increased from 2G for TensorFlow models
          cpus: '2.5'  # Increased from 2.0 for parallel inference
        reservations:
          memory: 2G  # Guaranteed memory for model loading
          cpus: '1.0'  # Guaranteed CPU for responsiveness
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
    driver_opts:
      com.docker.network.enable_ipv6: "false"
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  db_data:
