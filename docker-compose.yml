services:
  nginx:
    image: nginx:latest
    container_name: urban-gala-nginx
    ports:
      - "80:80"
      - "443:443" # For future HTTPS
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
      - llm-service
    networks:
      - app-network

  db:
    image: mysql:8.0
    container_name: urban-gala-db
    restart: unless-stopped
    # No need to expose DB port to host machine
    # ports:
    #   - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: urban_gala
      MYSQL_USER: urbanuser
      MYSQL_PASSWORD: urbanpass
    # Set default authentication plugin for compatibility with older clients
    command:
      - --local-infile=1
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "$${MYSQL_USER}", "-p$${MYSQL_PASSWORD}"]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 40s
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/docker/db-config/${MYSQL_CONFIG_FILE:-my.cnf}:/etc/mysql/conf.d/my.cnf:ro
    networks:
      - app-network
    mem_limit: 1g
    cpus: 0.5

  backend:
    build:
      context: ./backend
      args:
        BUILDKIT_INLINE_CACHE: 1
    container_name: urban-gala-backend
    # Port is now exposed only to the internal network, not the host
    # ports:
    #   - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      llm-service:
        condition: service_healthy
      busyness-service:
        condition: service_healthy
    environment:
      BUSYNESS_SERVICE_URL: http://busyness-service:5000
      LLM_SERVICE_URL: http://llm-service:5000
      APP_JWT_SECRET: ${APP_JWT_SECRET}
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    mem_limit: 1g
    cpus: 0.5

  frontend:
    build:
      context: ./frontend
    container_name: urban-gala-frontend
    # No command needed, the Dockerfile's CMD will be used
    # No volumes needed for production, as the build is self-contained
    # No ports exposed to host
    environment:
      - HOST=0.0.0.0
      -  VITE_GOOGLE_API_KEY=${VITE_GOOGLE_API_KEY}
    depends_on:
      - backend
    networks:
      - app-network
    mem_limit: 1g
    cpus: 0.5

  llm-service:
    build:
      context: ./backend/llm-service
    container_name: urban-gala-llm
    ports:
      - "5001:5000"
    # Mount the entire data directory, which now includes the CSV file
    volumes:
      - ./backend/llm-service/data:/app/data:ro
    environment:
      - FLASK_ENV=production
      - MODEL_PATH=/app/models/sentence-transformers
      - EMBEDDINGS_PATH=/app/data/location_embeddings.npy
      - HF_TOKEN=${HF_TOKEN}
      - DATA_PATH=/app/data/locations.csv
      - PYTHONUNBUFFERED=1
    networks:
      - app-network
    # Increase worker timeout to prevent crashes during intensive ML operations
    command: gunicorn --bind 0.0.0.0:5000 --timeout 120 "app:app"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s  # Give more time for model loading
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.5

  busyness-service:
    build:
      context: ./backend/busyness-service
    container_name: urban-gala-busyness
    ports:
      - "5002:5000"
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    networks:
      - app-network
    healthcheck:
      # Tighter healthcheck to get faster feedback on the crash-loop.
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 15s # Give 15s to start. If it fails after this, we know it's crashing.
    restart: unless-stopped
    mem_limit: 1g
    cpus: 0.5

networks:
  app-network:
    driver: bridge
    driver_opts:
      com.docker.network.enable_ipv6: "false"
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  db_data:
