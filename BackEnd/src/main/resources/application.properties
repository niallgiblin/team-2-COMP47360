spring.application.name=busyness_predictor

spring.datasource.url=jdbc:mysql://db:3306/urban_gala?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&allowLoadLocalInfile=true
spring.datasource.username=urbanuser
spring.datasource.password=urbanpass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Add these important HikariCP settings
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=5

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/actuator
management.endpoint.mappings.access=unrestricted

# Important for initialization
spring.jpa.hibernate.ddl-auto=update

# Explicitly set the MySQL dialect to ensure correct DDL generation
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ML Service Configuration
llm.service.url=http://llm-service:5000
busyness.service.url=http://busyness-service:5000

# =======================================
# JWT Configuration
# =======================================
# This secret is loaded from an environment variable for security.
# See docker-compose.yml and your .env file.
app.jwt.secret=${APP_JWT_SECRET}
app.jwtExpirationInMs=86400000

# =======================================
# CORS Configuration
# =======================================
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://34.244.154.146:5173

logging.level.org.springframework.web.cors=DEBUG
logging.level.org.springframework.security.web.FilterChainProxy=DEBUG