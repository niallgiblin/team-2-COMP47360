spring.application.name=busyness_predictor

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Add these important HikariCP settings
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.endpoints.web.base-path=/actuator
management.endpoint.mappings.access=none

# Important for initialization
spring.jpa.hibernate.ddl-auto=update

# Explicitly set the MySQL dialect to ensure correct DDL generation
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ML Service Configuration
llm.service.url=${LLM_SERVICE_URL:http://localhost:5001}
busyness.service.url=${BUSYNESS_SERVICE_URL:http://localhost:5002}

# =======================================
# JWT Configuration
# =======================================
# This secret is loaded from an environment variable for security.
# See docker-compose.yml and your .env file.
app.jwt.secret=${APP_JWT_SECRET}
app.jwtExpirationInMs=86400000

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# Static Resources Configuration (Updated for Docker container; APP_AVATARS_DIR env override)
app.avatars.dir=${APP_AVATARS_DIR:./avatars}
spring.web.resources.static-locations=classpath:/static/,file:${app.avatars.dir}/