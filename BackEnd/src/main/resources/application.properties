spring.application.name=busyness_predictor

spring.datasource.url=jdbc:mysql://db:3306/urban_gala?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=urbanuser
spring.datasource.password=urbanpass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Add these important HikariCP settings
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.initialization-fail-timeout=60000

spring.security.user.name=admin
spring.security.user.password=adminpass
spring.security.user.roles=ADMIN

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/actuator
management.endpoint.mappings.access=unrestricted

# Important for initialization
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always

# ML Service Configuration
ml.service.url=http://ml-service:5000
ml.service.enabled=true