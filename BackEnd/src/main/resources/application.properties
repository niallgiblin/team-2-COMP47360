spring.application.name=busyness_predictor

spring.datasource.url=jdbc:mysql://db:3306/urban_gala
spring.datasource.username=urbanuser
spring.datasource.password=urbanpass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.security.user.name=admin
spring.security.user.password=adminpass
spring.security.user.roles=ADMIN

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/actuator
management.endpoint.mappings.access=unrestricted

